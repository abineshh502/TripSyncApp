name: Android E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
        

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Node Dependencies
        run: |
          npm install

      - name: Run Expo Prebuild
        run: |
          npx expo prebuild --platform android --no-install

      - name: Build APK with JS Bundle (bundleInDebug=true)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon

      - name: Verify APK Generated
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✓ APK build verified successfully at $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "❌ ERROR: Debug APK was not generated!"
            exit 1
          fi

      - name: Start Android Emulator & Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x AppiumTests/scripts/ci_run_tests.sh
            ./AppiumTests/scripts/ci_run_tests.sh

      - name: Upload Test Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TripSync-Android-E2E-Reports
          path: |
            test-results/TripSync_Android_TestReport.xlsx
            test-results/html/execution-report.html
            test-results/appium.log
            test-results/screenshots/
          if-no-files-found: warn

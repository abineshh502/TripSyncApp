name: Android E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: [self-hosted, Windows, android]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Node Dependencies
        run: |
          npm install
        shell: bash

      - name: Run Expo Prebuild
        env:
          EXPO_PUBLIC_E2E_MODE: "true"
        run: |
          npx expo prebuild --platform android --no-install
        shell: bash

      - name: Inject bundleInDebug in build.gradle
        run: |
          node -e "
          const fs = require('fs');
          const file = 'android/app/build.gradle';
          let content = fs.readFileSync(file, 'utf8');
          if (content.includes('bundleCommand =') && !content.includes('bundleInDebug =')) {
            content = content.replace('bundleCommand = \"export:embed\"', 'bundleCommand = \"export:embed\"\n    bundleInDebug = true');
            fs.writeFileSync(file, content, 'utf8');
            console.log('✓ Successfully injected bundleInDebug = true into build.gradle');
          } else {
            console.log('⚠️ Could not find bundleCommand or bundleInDebug already exists');
          }
          "
        shell: bash

      - name: Build APK with JS Bundle (bundleInDebug=true)
        env:
          EXPO_PUBLIC_E2E_MODE: "true"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PbundleInDebug=true
        shell: bash

      - name: Verify APK Generated
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✓ APK build verified successfully at $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "❌ ERROR: Debug APK was not generated!"
            exit 1
          fi
        shell: bash

      - name: Run E2E Tests on Real Device
        run: |
          chmod +x AppiumTests/scripts/ci_run_tests.sh
          ./AppiumTests/scripts/ci_run_tests.sh
        shell: bash

      - name: Upload Test Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TripSync-Android-E2E-Reports
          path: |
            test-results/TripSync_Android_TestReport.xlsx
            test-results/html/execution-report.html
            test-results/appium.log
            test-results/screenshots/
          if-no-files-found: warn

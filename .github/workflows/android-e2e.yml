name: Android E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: [self-hosted, Windows, android]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Node Dependencies
        run: npm install
        shell: powershell

      - name: Run Expo Prebuild
        env:
          EXPO_PUBLIC_E2E_MODE: "true"
        run: npx expo prebuild --platform android --no-install
        shell: powershell

      - name: Configure Android SDK Path
        run: node scripts/setup-android-sdk.js
        shell: powershell

      - name: Inject bundleInDebug in build.gradle
        run: node scripts/inject-bundle-in-debug.js
        shell: powershell

      - name: Build APK with JS Bundle (bundleInDebug=true)
        env:
          EXPO_PUBLIC_E2E_MODE: "true"
        run: |
          cd android
          .\gradlew.bat assembleDebug -PbundleInDebug=true
        shell: powershell

      - name: Verify APK Generated
        run: |
          if (Test-Path "android/app/build/outputs/apk/debug/app-debug.apk") {
            Write-Host "✓ APK build verified successfully"
            Get-Item "android/app/build/outputs/apk/debug/app-debug.apk"
          } else {
            Write-Error "❌ ERROR: Debug APK was not generated!"
            exit 1
          }
        shell: powershell

      - name: Run E2E Tests on Real Device
        run: node AppiumTests/scripts/ci_run_tests.js
        shell: powershell

      - name: Upload Test Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TripSync-Android-E2E-Reports
          path: |
            test-results/TripSync_Android_TestReport.xlsx
            test-results/html/execution-report.html
            test-results/appium.log
            test-results/screenshots/
          if-no-files-found: warn

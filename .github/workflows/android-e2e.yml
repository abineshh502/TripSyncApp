name: Android E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Prebuild Expo Android Platform
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..

      - name: Install Appium and Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run E2E Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Start Appium server in background
            appium --port 4723 --address 127.0.0.1 &
            # Wait for Appium server to start
            sleep 10
            # Run the test suite
            node AppiumTests/runner.js

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TripSync-Android-E2E-Reports
          path: |
            TripSync_Android_TestReport.xlsx
            test-results/html/execution-report.html
          if-no-files-found: error

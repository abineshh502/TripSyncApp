name: Android E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: macos-13
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'TripSyncApp/package-lock.json'

      - name: Install Node Dependencies
        run: |
          cd TripSyncApp
          npm ci

      - name: Run Expo Prebuild
        run: |
          cd TripSyncApp
          npx expo prebuild --platform android --no-install

      - name: Build APK with Gradle
        run: |
          cd TripSyncApp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Start Android Emulator & Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            chmod +x TripSyncApp/AppiumTests/scripts/ci_run_tests.sh
            ./TripSyncApp/AppiumTests/scripts/ci_run_tests.sh

      - name: Upload Test Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TripSync-Android-E2E-Reports
          path: |
            TripSyncApp/test-results/TripSync_Android_TestReport.xlsx
            TripSyncApp/test-results/html/execution-report.html
            TripSyncApp/test-results/appium.log
            TripSyncApp/test-results/screenshots/
          if-no-files-found: warn
